<!DOCTYPE html>
<html>
<head>
  <title>Lead Submission and Demo Scheduling Platform</title>
  <style>
    /* Chat box style */
    #chat {
      border: 2px solid #2563eb;
      padding: 20px;
      margin-bottom: 20px;
      font-size: 20px;
      border-radius: 10px;
      max-width: 600px;
      background-color: #f0f8ff;
    }

    #chat button {
      padding: 12px 20px;
      font-size: 18px;
      margin-right: 10px;
      cursor: pointer;
      border-radius: 6px;
      border: none;
      background-color: #2563eb;
      color: white;
    }

    #chat button:hover { background-color: #1e40af; }

    /* Lead & Demo form style */
    #form input, #newDemoForm input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    #form button, #newDemoForm button {
      padding: 14px 20px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background-color: #2563eb;
      color: white;
    }

    #form button:hover, #newDemoForm button:hover { background-color: #1e40af; }

    /* Container styling */
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #f4f4f4;
    }

    #form, #newDemoForm, #historyDiv { max-width: 600px; width: 100%; margin-top: 20px; }
    #customerLinks a { display:block; margin:10px 0; font-weight:bold; color:#1e40af; text-decoration:underline; text-align:center; }
    #historyDiv table { width:100%; border-collapse: collapse; background: #fff; }
    #historyDiv th, #historyDiv td { border: 1px solid #ccc; padding:10px; text-align:left; }
    #historyDiv th { background: #eee; }
  </style>
</head>
<body>

<!-- Initial chatbot box -->
<div id="chat">
  <p id="message"></p>
  <button id="yesBtn">Yes</button>
  <button id="noBtn">No</button>
</div>

<!-- Main lead/demo form -->
<div id="form" style="display:none;">
  <h3>Submit Business Lead</h3>

  <input id="name" placeholder="Please enter your name" />
  <input id="email" placeholder="Please enter your emailID" />
  <input id="contactNumber" placeholder="Please enter your contact number" />

  <button id="submitLead">Submit Lead</button>
  <p id="leadMessage" style="color:green"></p>

  <hr>

  <h3>Book Demo</h3>
  <input id="date" type="date" />
  <input id="time" type="time" />
  <button id="submitDemo">Book Demo</button>
  <p id="demoMessage" style="color:green"></p>

  <hr>
  
  <div id="customerLinks" style="margin-top:10px; display:none;">
</div>
</div>

<!-- New demo link form -->
<div id="newDemoForm" style="display:none;">
  <h3>Book Demo (New Link)</h3>
  <input id="newEmail" placeholder="Email used in lead submission" />
  <input id="newContactNumber" placeholder="Contact number used in lead submission" />
  <input id="newDate" type="date" />
  <input id="newTime" type="time" />
  <button id="submitNewDemo">Book Demo</button>
  <p id="newDemoMessage" style="color:green"></p>
  <hr>
  <div id="historyDiv"></div>
</div>

<script src="/static/index.js"></script>
</body>
</html>
